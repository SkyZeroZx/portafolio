<div class="technologies">
	@for (technology of technologies(); track technology.name) {
		<div class="technologies__item" [title]="technology.name" [attr.aria-label]="technology.name">
			<img
				[width]="40"
				[height]="40"
				[alt]="technology.name"
				[ngSrc]="technology.src"
				class="technologies__image"
				[class.technologies__image--dark]="technology.isDark"
			/>
		</div>
	}
</div>
