<div class="language-selector">
	<div class="language-selector__inner">
		<p class="language-selector__label">
			{{ 'language-selector' | translate }}
		</p>
		<input (change)="toggleLanguage()" [checked]="isEnglish()" class="language-selector__input" id="cb3" type="checkbox" />
		<label class="language-selector__toggle" data-tg-off="ES" data-tg-on="EN" for="cb3"></label>
	</div>
</div>
