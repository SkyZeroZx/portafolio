<section appAddAnimation id="contact" class="contact">
	<div class="section-shell">
		<h1 class="section-heading">
			{{ 'contact.title' | translate }}
		</h1>

		<div class="contact__grid">
			<a
				class="surface-panel contact__card"
				href="https://wa.me/51961008127?text=Hola%20quiero%20contactarme%20"
				target="_blank"
				rel="noopener noreferrer"
			>
				<span class="contact__icon">
					<fa-icon [icon]="faWhatsapp" />
				</span>
				<span class="contact__title">WhatsApp</span>
				<span class="contact__copy">{{ 'contact.content.whatsapp' | translate }}</span>
			</a>

			<a class="surface-panel contact__card" href="mailto:jaimeburgostejada@gmail.com" target="_blank" rel="noopener noreferrer">
				<span class="contact__icon">
					<fa-icon [icon]="faEnvelope" />
				</span>
				<span class="contact__title">Email</span>
				<span class="contact__copy">{{ 'contact.content.email' | translate }}</span>
			</a>

			<a
				class="surface-panel contact__card"
				href="https://www.linkedin.com/in/jaime-burgos-tejada-a45697203/"
				rel="noopener noreferrer"
				target="_blank"
			>
				<span class="contact__icon">
					<fa-icon [icon]="faLinkedin" />
				</span>
				<span class="contact__title">LinkedIn</span>
				<span class="contact__copy">{{ 'contact.content.linkedin' | translate }}</span>
			</a>
		</div>
	</div>
</section>
