<section id="experience" class="career">
	<div class="section-shell career__shell">
		<header class="career__header">
			<h1>{{ 'experience.title' | translate }}</h1>
			<p>{{ 'experience.subtitle' | translate }}</p>
		</header>

		<div class="career__layout">
			<article class="career__panel career__panel--main">
				<h2>{{ 'experience.work-title' | translate }}</h2>
				<app-timeline [listTimeline]="experiences()" [animationOptions]="animationOptions" [markerIcon]="faBriefcase" />
			</article>

			<aside class="career__panel career__panel--side">
				<h2>{{ 'experience.education-title' | translate }}</h2>
				<app-timeline [listTimeline]="studies()" [compact]="true" [markerIcon]="faGraduationCap" />
			</aside>
		</div>
	</div>
</section>
