<section appAddAnimation id="portfolio" class="portfolio" [animationOptions]="animationOptions">
	<div class="section-shell">
		<h1 class="section-heading">
			{{ 'portfolio.title' | translate }}
		</h1>

		<div class="portfolio__grid">
			@for (portfolio of portfolioProjects(); track portfolio.id) {
				<button type="button" class="surface-panel portfolio__card" [id]="portfolio.id" (click)="openModal(portfolio)">
					<span class="portfolio__media">
						<img [alt]="portfolio.name | translate" [src]="portfolio.logo" [loading]="'lazy'" />
					</span>
					<span class="portfolio__body">
						<span class="portfolio__title">{{ portfolio.name | translate }}</span>
						<span class="portfolio__description">{{ portfolio.description | translate }}</span>
					</span>
					<span class="portfolio__view-more">
						<span>{{ 'portfolio.view-more' | translate }}</span>
						<svg
							fill="none"
							stroke="currentColor"
							stroke-linecap="round"
							stroke-linejoin="round"
							stroke-width="2"
							viewBox="0 0 24 24"
						>
							<path d="M5 12h14M12 5l7 7-7 7"></path>
						</svg>
					</span>
				</button>
			}
		</div>
	</div>
</section>
